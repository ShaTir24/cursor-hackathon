# Auto-Deploy:                Yes
#
# Dockerfile runs:
#   apt (ffmpeg + curl) → install Cursor Agent CLI (`agent` / `cursor-agent`)
#   → npm ci → npm run build → npm prune
# Binaries on PATH: agent, cursor-agent (auth via CURSOR_API_KEY at runtime)

