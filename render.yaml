# Optional Blueprint stub (unused when deploying manually). Kept so editors
# that expect a services: key still validate. Prefer Dashboard settings above.
services:
  - type: web
    name: edureels-api
    runtime: docker
    plan: starter
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit
    disk:
      name: edureels-media
      mountPath: /data
      sizeGB: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: HLS_ROOT
        value: /data/hls
      - key: TTS_CACHE_DIR
        value: /data/tts-cache
      - key: FFMPEG_PATH
        value: ffmpeg
      - key: TTS_DAILY_CHAR_BUDGET
        value: "50000"
      - key: ELEVENLABS_MODEL
        value: eleven_flash_v2_5
      - key: TTS_FORCE_FIXTURES
        value: "false"
      - key: AUTH_DEV_BYPASS
        value: "false"
      - key: EXA_ENABLED
        value: "true"
      - key: FRONTEND_URL
        value: https://edureels-web.onrender.com
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: EXA_API_KEY
        sync: false
      - key: CURSOR_API_KEY
        sync: false
      - key: VIDEO_CREATION_API_KEY
        sync: false
      - key: MIXAMO_ACCESS_TOKEN
        sync: false

  - type: web
    name: edureels-web
    runtime: static
    region: oregon
    branch: main
    rootDir: web
    autoDeployTrigger: commit
    buildCommand: |
      set -e
      npm ci
      node <<'NODE'
      const fs = require("fs");
      const path = require("path");
      const cfgPath = "next.config.ts";
      let cfg = fs.readFileSync(cfgPath, "utf8");
      cfg = cfg.replace(
        /output:\s*["']standalone["']/,
        'output: "export",\n  images: { unoptimized: true }',
      );
      if (!cfg.includes('output: "export"') && !cfg.includes("output: 'export'")) {
        throw new Error("could not set output: export in next.config.ts");
      }
      fs.writeFileSync(cfgPath, cfg);
      const layoutPath = path.join("src", "app", "(app)", "player", "[id]", "layout.tsx");
      fs.mkdirSync(path.dirname(layoutPath), { recursive: true });
      fs.writeFileSync(
        layoutPath,
        [
          'import type { ReactNode } from "react";',
          "",
          "export function generateStaticParams() {",
          '  return [{ id: "_" }];',
          "}",
          "",
          "export default function PlayerIdLayout({",
          "  children,",
          "}: {",
          "  children: ReactNode;",
          "}) {",
          "  return children;",
          "}",
          "",
        ].join("\n"),
      );
      NODE
      npm run build
      test -d out
    staticPublishPath: ./out
    routes:
      - type: rewrite
        source: /player/*
        destination: /player/_/index.html
    envVars:
      - key: NODE_VERSION
        value: "22.14.0"
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: NEXT_PUBLIC_AUTH_DEV_BYPASS
        value: "false"
      - key: NEXT_PUBLIC_API_BASE
        value: https://edureels-api.onrender.com
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
