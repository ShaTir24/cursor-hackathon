services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - path: docker-compose.env
        required: true
    environment:
      PORT: "3000"
      HLS_ROOT: /data/hls
      TTS_CACHE_DIR: /data/tts-cache
      FFMPEG_PATH: ffmpeg
      # Real Supabase JWT required (no x-user-id guest bypass)
      AUTH_DEV_BYPASS: "false"
      # Demo MP4 → HLS (host file via ./backend/data mount). Set false for scene pipeline.
      HLS_USE_DEMO_MP4: ${HLS_USE_DEMO_MP4:-auto}
      HLS_DEMO_MP4: ${HLS_DEMO_MP4:-/app/data/demo-source.mp4}
    volumes:
      - hls-data:/data
      # Host demo MP4 (demo-source.mp4) visible inside the API container
      - ./backend/data:/app/data:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      # Hot-reload Next.js — edit web/src and refresh http://localhost:3001 (no rebuild).
      # For a production image instead: change target to "runner" and remove the volumes below.
      target: dev
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:3000}
        NEXT_PUBLIC_AUTH_DEV_BYPASS: ${NEXT_PUBLIC_AUTH_DEV_BYPASS:-false}
    ports:
      - "3001:3001"
    env_file:
      - path: docker-compose.env
        required: true
    environment:
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:3000}
      NEXT_PUBLIC_AUTH_DEV_BYPASS: ${NEXT_PUBLIC_AUTH_DEV_BYPASS:-false}
    volumes:
      # Live source — changes appear without docker compose build
      - ./web:/app
      # Keep Linux node_modules in the container (not the host Mac folder)
      - web_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_healthy

volumes:
  hls-data:
  web_node_modules:
