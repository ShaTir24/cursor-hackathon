services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - path: docker-compose.env
        required: true
    environment:
      PORT: "3000"
      HLS_ROOT: /data/hls
      TTS_CACHE_DIR: /data/tts-cache
      FFMPEG_PATH: ffmpeg
      AUTH_DEV_BYPASS: "false"
    volumes:
      - hls-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:3000}
    ports:
      - "3001:3001"
    env_file:
      - path: docker-compose.env
        required: true
    environment:
      PORT: "3001"
      # Also set at runtime (server); client bundle still needs rebuild with build args
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:3000}
    depends_on:
      api:
        condition: service_healthy

volumes:
  hls-data:
